spring:
  config:
    import:
      - "optional:file:./hollin-gate.yaml"
      - "optional:file:/etc/hollin-gate/hollin-gate.yaml"
  application:
    name: hollin-gate
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: "jdbc:sqlite:./hollin-gate.db"
    driver-class-name: "org.sqlite.JDBC"
    username: sa
    password: sa
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    database-platform: "org.hibernate.community.dialect.SQLiteDialect"
    hibernate:
      ddl-auto: validate
gg:
  jte:
    #    usePrecompiledTemplates: true
    developmentMode: true